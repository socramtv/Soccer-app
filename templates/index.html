<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Agenda Deportiva</title>
    <style>
        /* Estilos base inspirados en Andrenalina (Premium Dark) */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 70px; /* Espacio para que el botón flotante no tape contenido */
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: linear-gradient(145deg, #1f1f1f, #151515);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #2a2a2a;
        }

        h1 {
            font-size: 1.4rem;
            margin: 0;
            color: #ffffff;
        }

        h1 span {
            color: #00ff88;
            font-size: 0.9rem;
            display: block;
            margin-top: 5px;
        }

        /* Contenedor adaptativo de tablas heredado de Andrenalina */
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* Scroll suave en iOS */
            background-color: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border: 1px solid #2a2a2a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
            min-width: 450px; /* Mantiene la estructura interna intacta en pantallas pequeñas */
        }

        th {
            background-color: #252525;
            color: #00ff88;
            padding: 12px 10px;
            font-weight: 600;
            border-bottom: 2px solid #2a2a2a;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #2a2a2a;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:nth-child(even) {
            background-color: #161616;
        }

        /* Estilos para textos informativos */
        .hora {
            font-weight: bold;
            color: #ffffff;
            white-space: nowrap;
        }

        .liga {
            color: #aaa;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .partido {
            color: #ffffff;
            font-weight: 500;
        }

        .canal-texto-vacio {
            color: #777777;
            font-size: 0.8rem;
            display: inline-block;
            margin: 2px 0;
        }

        /* Botones táctiles premium para los enlaces AceStream */
        .btn-canal {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, #282828 0%, #1f1f1f 100%);
            color: #00ff88;
            padding: 6px 12px;
            margin: 3px 4px 3px 0;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid #333333;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-canal:active {
            transform: scale(0.95);
            background: #00ff88;
            color: #121212;
            border-color: #00ff88;
        }

        /* Botón Flotante para Limpiar Caché */
        .btn-recargar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #00ff88 0%, #00b35f 100%);
            color: #121212;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
            z-index: 999;
        }

        .btn-recargar:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🎯 Eventos Deportivos <span>Actualizado: {{ fecha }}</span></h1>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 15%">Hora</th>
                        <th style="width: 25%">Competición</th>
                        <th style="width: 35%">Encuentro</th>
                        <th style="width: 25%">Enlaces Disponibles</th>
                    </tr>
                </thead>
                <tbody>
                    {% for evento in eventos %}
                    <tr>
                        <td class="hora">{{ evento.hora }}</td>
                        <td class="liga">{{ evento.liga }}</td>
                        <td class="partido">{{ evento.equipos }}</td>
                        <td>
                            {{ evento.canales_html | safe }}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <a href="/recargar" class="btn-recargar">
        🔄 Forzar Actualización
    </a>

</body>
</html>
