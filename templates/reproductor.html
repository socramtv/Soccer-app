<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📺 SocramFlix - En Directo</title>
    <!-- Motor HLS necesario para reproducir el flujo en el navegador -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .player-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        h2 {
            margin: 0;
            font-size: 1.2rem;
            color: #ffffff;
        }

        .btn-volver {
            background: linear-gradient(135deg, #282828 0%, #1f1f1f 100%);
            color: #00ff88;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
        }

        .info-footer {
            text-align: center;
            color: #555;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="top-bar">
            <h2>📺 Viendo: {{ canal_name }}</h2>
            <a href="/" class="btn-volver">⬅ Volver a la Agenda</a>
        </div>

        <div class="video-wrapper">
            <video id="player" controls autoplay playsinline></video>
        </div>

        <p class="info-footer">Asegúrate de tener la app Ace Stream Engine abierta en segundo plano en tu dispositivo.</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let video = document.getElementById('player');
            let streamUrl = "{{ stream_url | safe }}";

            if (Hls.isSupported()) {
                let hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        } );
    </script>

</body>
</html>
